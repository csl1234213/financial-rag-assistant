# ============================================================
# Production Compose — optimized, health checks, restart always
# ============================================================
# Usage:
#   docker compose -f deploy/docker-compose.base.yml -f deploy/docker-compose.prod.yml up -d
# ============================================================
name: financial-rag-prod

services:
  financial-api:
    env_file:
      - .env.prod
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  financial-ui:
    env_file:
      - .env.prod
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"