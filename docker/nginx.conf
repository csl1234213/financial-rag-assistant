# ============================================================
# Nginx Reverse Proxy — Phase 3 (Cloud Deployment)
# ============================================================
# Usage:
#   docker compose -f deploy/docker-compose.prod.yml up
#   (uncomment nginx service in docker-compose.prod.yml)
# ============================================================

upstream financial_api {
    server financial-api:8000;
}

upstream financial_ui {
    server financial-ui:8501;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css text/xml;

    # Static files (future)
    root /usr/share/nginx/html;
    index index.html;

    # ---- API (REST) ----
    location /api/ {
        proxy_pass http://financial_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ---- Streamlit UI ----
    location / {
        proxy_pass http://financial_ui;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Streamlit requires it)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # ---- Health Check ----
    location /health {
        proxy_pass http://financial_api/api/v1/health;
        proxy_set_header Host $host;
    }
}

